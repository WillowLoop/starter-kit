# Production Docker Compose
# Gebruik: docker compose -f docker-compose.prod.yml up -d
# Vereist: BACKEND_IMAGE_TAG + FRONTEND_IMAGE_TAG env vars

networks:
  proxy-network:
    name: proxy-network     # Caddy + frontend + backend
    internal: false
  backend-network:
    internal: true          # DB + Redis: alleen bereikbaar voor app-container

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=50m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"     # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data         # TLS certificates
      - caddy_config:/config     # Caddy runtime config
    networks:
      - proxy-network
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
          pids: 200
    security_opt:
      - no-new-privileges:true

  app:
    image: ghcr.io/${DOCKER_IMAGE_ORG}/${DOCKER_IMAGE_REPO}/backend:${BACKEND_IMAGE_TAG:?BACKEND_IMAGE_TAG must be set}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=100m,uid=1001,gid=1001  # uid/gid matcht appuser in Dockerfile
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: "/tmp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy-network
      - backend-network
    ports:
      - "127.0.0.1:8000:8000"   # Health check only — not externally exposed
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
          pids: 200
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend-network    # GEEN proxy-network — niet extern bereikbaar
    # Geen ports: blok — DB is nooit direct bereikbaar van buiten
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
          pids: 200
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend-network    # GEEN proxy-network
    # Geen ports: blok
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
          pids: 200
    security_opt:
      - no-new-privileges:true

  frontend:
    image: ghcr.io/${DOCKER_IMAGE_ORG}/${DOCKER_IMAGE_REPO}/frontend:${FRONTEND_IMAGE_TAG:?FRONTEND_IMAGE_TAG must be set}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /app/.next/cache:size=200m,uid=1001,gid=1001
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - proxy-network
    ports:
      - "127.0.0.1:3000:3000"   # Health check only — not externally exposed
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
          pids: 200
    security_opt:
      - no-new-privileges:true
