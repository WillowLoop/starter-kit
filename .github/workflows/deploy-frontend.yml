name: Deploy Frontend

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. frontend-v0.2.0)'
        required: false
        type: string
      environment:
        description: 'Target environment (preview or production)'
        required: false
        type: string
        default: production
  # STAP 1: Verwijder dit commentaar en uncomment de triggers hieronder
  # nadat je VERCEL_TOKEN, VERCEL_ORG_ID en VERCEL_PROJECT_ID hebt ingesteld.
  # Zie docs/workflows/cicd-setup.md voor instructies.
  #
  # pull_request:
  #   branches: [main]
  #   paths: ['frontend/**', '.github/workflows/deploy-frontend.yml']
  # push:
  #   branches: [main]
  #   paths: ['frontend/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: preview
        type: choice
        options: [preview, production]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || (github.event_name == 'pull_request' && 'preview' || 'production') }}
      url: ${{ steps.deploy.outputs.url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - id: deploy
        uses: amondnet/vercel-action@34c3c2b72f4e1d10b4b4c18d5f2e8d3c8e7f5e5a # v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: ${{ (inputs.environment || 'production') == 'production' && '--prod' || '' }}
      - name: Post preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `🚀 Preview: ${{ steps.deploy.outputs.url }}`
            })
